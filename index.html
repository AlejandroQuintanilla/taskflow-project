<!DOCTYPE html>
<html lang="es" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow – Gestión de tareas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-stone-100 dark:bg-stone-950 text-stone-900 dark:text-stone-100 min-h-screen transition-colors duration-300">

  <!-- ① CABECERA -->
  <header class="bg-stone-900 dark:bg-black text-white border-b-4 border-red-600 px-4 py-4 sm:px-8 sm:py-5 flex items-center justify-between gap-4 sticky top-0 z-50">
    <div class="flex flex-col gap-1 min-w-0 flex-1">
      <h1 class="font-serif text-3xl sm:text-4xl font-bold tracking-tight leading-none">
        Task<span class="text-red-500">Flow</span>
      </h1>
      <p class="text-sm text-white/40 italic">Organiza tu día, una tarea a la vez.</p>
    </div>

    <!-- Botón modo oscuro -->
    <button
      id="btn-dark-mode"
      aria-label="Cambiar modo oscuro"
      class="text-xs font-mono uppercase tracking-widest px-4 py-2 border border-stone-600 rounded text-stone-400 hover:border-white hover:text-white transition-all shrink-0"
    >
      🌙 Oscuro
    </button>
  </header>

  <!-- WRAPPER FLEXBOX -->
  <div class="app-wrapper">

    <main>

      <!-- ② FORMULARIO -->
      <section class="form-section" aria-labelledby="form-title">
        <h2 id="form-title" class="text-xs font-mono uppercase tracking-widest text-stone-400 dark:text-stone-500 mb-4">Nueva tarea</h2>

        <form id="task-form" class="flex flex-wrap gap-3 items-end">

          <div class="field-input">
            <label for="task-input" class="block text-xs font-mono uppercase tracking-wider text-stone-400 dark:text-stone-500 mb-1">Descripción</label>
            <input
              type="text"
              id="task-input"
              name="task"
              placeholder="Escribe una tarea..."
              autocomplete="off"
              required
              class="w-full h-12 px-3 border-2 border-stone-200 dark:border-stone-700 rounded bg-stone-50 dark:bg-stone-900 text-base focus:border-stone-900 dark:focus:border-white focus:outline-none transition-colors placeholder:text-stone-300 dark:placeholder:text-stone-600"
            />
          </div>

          <div class="field-priority">
            <label for="task-priority" class="block text-xs font-mono uppercase tracking-wider text-stone-400 dark:text-stone-500 mb-1">Prioridad</label>
            <select
              id="task-priority"
              name="priority"
              class="w-full h-12 px-3 border-2 border-stone-200 dark:border-stone-700 rounded bg-stone-50 dark:bg-stone-900 text-base focus:border-stone-900 dark:focus:border-white focus:outline-none transition-colors"
            >
              <option value="alta">Alta</option>
              <option value="media" selected>Media</option>
              <option value="baja">Baja</option>
            </select>
          </div>

          <button type="submit" class="btn-submit h-12 px-6 bg-red-600 hover:bg-red-700 text-white border-2 border-red-600 rounded text-sm font-mono uppercase tracking-wider transition-all hover:-translate-x-px hover:-translate-y-px hover:shadow-[4px_4px_0_#1c1917] active:translate-x-px active:translate-y-px active:shadow-none focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">
            + Añadir
          </button>

        </form>
      </section>

      <!-- ③ LISTA DE TAREAS -->
      <section class="list-section" aria-labelledby="list-title">

        <div class="list-header">
          <h2 id="list-title" class="text-xs font-mono uppercase tracking-widest text-stone-400 dark:text-stone-500">Lista de tareas</h2>
          <div class="filters" role="group" aria-label="Filtrar tareas">
            <button class="filter-btn active" data-filter="all">Todas</button>
            <button class="filter-btn" data-filter="pending">Pendientes</button>
            <button class="filter-btn" data-filter="completed">Completadas</button>
          </div>
        </div>

        <label for="search-input" class="sr-only">Buscar tareas</label>
        <input
          type="search"
          id="search-input"
          placeholder="Buscar tarea..."
          aria-label="Buscar tareas"
          class="w-full h-10 px-3 border border-stone-200 dark:border-stone-700 rounded bg-stone-50 dark:bg-stone-900 text-sm mb-4 focus:border-stone-900 dark:focus:border-white focus:outline-none transition-colors placeholder:text-stone-300 dark:placeholder:text-stone-600"
        />

        <ul id="task-list" aria-live="polite" aria-label="Lista de tareas"></ul>

      </section>

    </main>

    <!-- ④ PANEL LATERAL DE ESTADÍSTICAS -->
    <aside aria-labelledby="stats-title">
      <h2 id="stats-title" class="text-xs font-mono uppercase tracking-widest text-stone-400 dark:text-stone-500 mb-1">Estadísticas</h2>

      <dl>
        <div class="stat-card dark:bg-stone-900 dark:border-stone-700">
          <dt class="text-xs font-mono uppercase tracking-wider text-stone-400 dark:text-stone-500 mb-1">Total de tareas</dt>
          <dd id="stat-total" class="font-serif text-4xl font-bold leading-none">0</dd>
        </div>

        <div class="stat-card dark:bg-stone-900 dark:border-stone-700">
          <dt class="text-xs font-mono uppercase tracking-wider text-stone-400 dark:text-stone-500 mb-1">Completadas</dt>
          <dd id="stat-completed" class="accent font-serif text-4xl font-bold leading-none">0</dd>
          <div class="progress-wrap mt-2">
            <div class="progress-label text-xs text-stone-400 dark:text-stone-500 mb-1" id="stat-percent">0% completado</div>
            <div class="progress-bar-bg bg-stone-200 dark:bg-stone-700">
              <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
            </div>
          </div>
        </div>

        <div class="stat-card dark:bg-stone-900 dark:border-stone-700">
          <dt class="text-xs font-mono uppercase tracking-wider text-stone-400 dark:text-stone-500 mb-1">Pendientes</dt>
          <dd id="stat-pending" class="font-serif text-4xl font-bold leading-none">0</dd>
        </div>
      </dl>

      <div class="bulk-actions">
        <button id="btn-complete-all" class="btn-bulk dark:border-stone-700 dark:text-stone-400 dark:hover:border-white dark:hover:text-white">✓ Completar todas</button>
        <button id="btn-clear-completed" class="btn-bulk dark:border-stone-700 dark:text-stone-400 dark:hover:border-white dark:hover:text-white">✕ Borrar completadas</button>
      </div>

    </aside>

  </div>

  <!-- PIE DE PÁGINA -->
  <footer class="text-center py-6 text-xs font-mono tracking-wider text-stone-400 dark:text-stone-600 border-t border-stone-200 dark:border-stone-800">
    <p>TaskFlow Alejandro Quintanilla Cobo &copy; 2026</p>
  </footer>

  <!-- ⑤ PLANTILLA DE TAREA -->
  <template id="task-template">
    <li class="task-item">
      <input type="checkbox" class="task-checkbox" />
      <span class="task-text"></span>
      <span class="task-priority"></span>
      <button type="button" class="task-delete" aria-label="Eliminar tarea">✕</button>
    </li>
  </template>

  <script type="module" src="app.js"></script>

</body>
</html>
